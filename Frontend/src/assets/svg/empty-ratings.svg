  <circle cx="108" cy="216" r="2" fill="#FACC15"/>
  <circle cx="118" cy="216" r="2" fill="#FACC15"/>
  <path d="M108 226 Q113 221 118 226" stroke="#FACC15" stroke-width="1.5" fill="none" stroke-linecap="round"/>

