  <path d="M330 110 L332 115 L337 117 L332 119 L330 124 L328 119 L323 117 L328 115 Z" fill="#FACC15" opacity="0.5"/>
  <circle cx="325" cy="220" r="5" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
